openapi: 3.0.3
info:
  title: MSA API
  version: '1.0.0'
  description: |
    OpenAPI specification for the MSA API (Azure Functions, .NET 8)
    Includes endpoints for user authentication, MFA, investment profiles, and investment profile questions.
    All endpoints require JWT authentication unless otherwise noted.
servers:
  - url: /api
paths:
  /clients/{clientId}/investment-profiles/draft:
    get:
      summary: Get the client's draft investment profile
      operationId: getDraftInvestmentProfile
      tags: [InvestmentProfiles]
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Draft investment profile found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvestmentProfileDraft'
        '404':
          description: No draft profile exists
    post:
      summary: Start a new draft investment profile
      operationId: startDraftInvestmentProfile
      tags: [InvestmentProfiles]
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                templateProfileId:
                  type: string
                  description: Optional profileId to copy from
      responses:
        '201':
          description: Draft investment profile created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationResult'
    put:
      summary: Update the client's draft investment profile
      operationId: updateDraftInvestmentProfile
      tags: [InvestmentProfiles]
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvestmentProfileDraftUpdate'
      responses:
        '200':
          description: Draft investment profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationResultWithFields'
    delete:
      summary: Discard the client's draft investment profile
      operationId: deleteDraftInvestmentProfile
      tags: [InvestmentProfiles]
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Draft investment profile discarded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationResult'
  /clients/{clientId}/investment-profiles/current:
    get:
      summary: Get the client's current active investment profile
      operationId: getCurrentInvestmentProfile
      tags: [InvestmentProfiles]
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Current investment profile found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvestmentProfileCurrent'
  /clients/{clientId}/investment-profiles/archived:
    get:
      summary: List all archived investment profiles for the client
      operationId: listArchivedInvestmentProfiles
      tags: [InvestmentProfiles]
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
        - name: skip
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: take
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: List of archived investment profiles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArchivedProfilesList'
  /clients/{clientId}/investment-profiles/archived/{profileId}:
    get:
      summary: Get a specific archived investment profile
      operationId: getArchivedInvestmentProfile
      tags: [InvestmentProfiles]
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
        - name: profileId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Archived investment profile found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvestmentProfileArchived'
        '404':
          description: Not found
  /clients/{clientId}/investment-profiles/draft/publish:
    post:
      summary: Publish the draft investment profile as the new current profile
      operationId: publishDraftInvestmentProfile
      tags: [InvestmentProfiles]
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Draft profile published successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublishResult'
  # --- AUTH ENDPOINTS ---
  /users/auth/signup:
    post:
      summary: Register a new user
      operationId: signUp
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignUpRequest'
      responses:
        '200':
          description: Signup response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignUpResponse'
  /users/auth/login:
    post:
      summary: Authenticate user with email and password
      operationId: login
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
  /users/auth/send-mfa:
    post:
      summary: Send OTP for MFA (email or SMS)
      operationId: sendMfa
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMfaRequest'
      responses:
        '200':
          description: Send MFA response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendMfaResponse'
  /users/auth/verify-mfa:
    post:
      summary: Verify OTP for MFA and complete authentication
      operationId: verifyMfa
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyMfaRequest'
      responses:
        '200':
          description: Verify MFA response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyMfaResponse'
  /users/auth/refresh-token:
    post:
      summary: Refresh access token using a valid refresh token
      description: |
        Exchanges a valid, non-expired, non-revoked refresh token for a new access token.
        Rotates the refresh token: the supplied token is invalidated and a new one is returned.
        Does not require MFA verification.
      operationId: refreshToken
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
                  description: The plaintext refresh token issued at login or last rotation
      responses:
        '200':
          description: New access token and rotated refresh token
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  accessToken:
                    type: string
                    description: New JWT access token (15-minute lifetime)
                  refreshToken:
                    type: string
                    description: New refresh token (7-day lifetime) — invalidates the old one
                  tokenType:
                    type: string
                    example: Bearer
                  expiresIn:
                    type: integer
                    description: Access token lifetime in seconds
                    example: 900
        '400':
          description: Missing or invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Refresh token is invalid, expired, or revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Unexpected server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users/auth/verify-email:
    post:
      summary: Verify user email address with token
      operationId: verifyEmail
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
      responses:
        '200':
          description: Verify email response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyEmailResponse'
  /users/auth/forgot-password:
    post:
      summary: Send password reset link to user's email
      operationId: forgotPassword
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: Forgot password response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationResult'
  /users/auth/reset-password:
    post:
      summary: Complete password reset with token and new password
      operationId: resetPassword
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Reset password response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationResult'
  /users/auth/logout:
    post:
      summary: Logout user and invalidate refresh token
      operationId: logout
      tags: [Auth]
      responses:
        '200':
          description: Logout response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationResult'
  # --- USER PROFILE ENDPOINTS ---
  /users/{userId}/profile:
    get:
      summary: Get a user's profile
      operationId: getUserProfile
      tags: [Users]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: User not found
    put:
      summary: Update a user's profile
      operationId: updateUserProfile
      tags: [Users]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserProfileRequest'
      responses:
        '200':
          description: Profile updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateUserProfileResponse'
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: User not found
  # --- INVESTMENT PROFILE QUESTIONS ENDPOINTS ---
  /investment-profile-questions/names:
    get:
      summary: List all valid investment profile question set names
      operationId: getInvestmentProfileQuestionSetNames
      tags: [InvestmentProfileQuestions]
      description: Returns the list of valid question set name values for use in other endpoints.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of valid question set names
          content:
            application/json:
              schema:
                type: object
                properties:
                  names:
                    type: array
                    items:
                      type: string
                    example:
                      - basic-individual-investment-profile
        '401':
          description: Unauthorized
  /investment-profile-questions/current:
    get:
      summary: Get the current active investment profile question set
      operationId: getCurrentInvestmentProfileQuestions
      tags: [InvestmentProfileQuestions]
      parameters:
        - name: name
          in: query
          required: false
          schema:
            type: string
            default: basic-individual-investment-profile
            enum:
              - basic-individual-investment-profile
          description: |
            The question set to return. Defaults to basic-individual-investment-profile.
            If no current set exists for the requested name it is auto-seeded from defaults.
      responses:
        '200':
          description: Current question set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvestmentProfileQuestionsDocument'
        '400':
          description: Invalid question set name
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
        '500':
          description: Internal server error
  /investment-profile-questions/draft:
    get:
      summary: Get the draft investment profile question set
      operationId: getDraftInvestmentProfileQuestions
      tags: [InvestmentProfileQuestions]
      responses:
        '200':
          description: Draft question set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvestmentProfileQuestionsDocument'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — supervisors only
        '404':
          description: No draft question set exists
    post:
      summary: Start a new draft investment profile question set
      operationId: startDraftInvestmentProfileQuestions
      tags: [InvestmentProfileQuestions]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  default: basic-individual-investment-profile
                  enum:
                    - basic-individual-investment-profile
                  description: The question set name to create a draft for.
                copyFromCurrent:
                  type: boolean
                  default: false
                  description: When true, copies questions from the current set as a starting point.
      responses:
        '201':
          description: Draft question set created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  questionsSetId:
                    type: string
                  name:
                    type: string
                  questionCount:
                    type: integer
        '400':
          description: Invalid question set name
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — supervisors only
    put:
      summary: Update the draft investment profile question set
      operationId: updateDraftInvestmentProfileQuestions
      tags: [InvestmentProfileQuestions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateInvestmentProfileQuestionsRequest'
      responses:
        '200':
          description: Draft question set updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  questionsSetId:
                    type: string
                  questionCount:
                    type: integer
        '400':
          description: Validation error — body required with at least description or questions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — supervisors only
        '404':
          description: No draft question set exists
    delete:
      summary: Discard the draft investment profile question set
      operationId: deleteDraftInvestmentProfileQuestions
      tags: [InvestmentProfileQuestions]
      responses:
        '200':
          description: Draft discarded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationResult'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — supervisors only
        '404':
          description: No draft question set exists
  /investment-profile-questions/draft/publish:
    post:
      summary: Publish the draft question set as the new current set
      operationId: publishDraftInvestmentProfileQuestions
      tags: [InvestmentProfileQuestions]
      description: |
        Archives the existing current set and promotes the draft to current.
        The archived set retains a 5-year retention window.
      responses:
        '200':
          description: Draft published successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublishQuestionsResult'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — supervisors only
        '404':
          description: No draft question set exists
  /investment-profile-questions/archived:
    get:
      summary: List all archived investment profile question sets
      operationId: listArchivedInvestmentProfileQuestions
      tags: [InvestmentProfileQuestions]
      parameters:
        - name: skip
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: take
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: List of archived question sets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArchivedQuestionSetsList'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — supervisors only
  /investment-profile-questions/archived/{questionsSetId}:
    get:
      summary: Get a specific archived investment profile question set
      operationId: getArchivedInvestmentProfileQuestions
      tags: [InvestmentProfileQuestions]
      parameters:
        - name: questionsSetId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Archived question set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvestmentProfileQuestionsDocument'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — supervisors only
        '404':
          description: Not found
components:
  schemas:
    InvestmentProfileDraft:
      type: object
      properties:
        profileId:
          type: string
        clientId:
          type: string
        status:
          type: string
          enum: [draft]
        investmentObjective:
          type: string
        riskTolerance:
          type: string
        basedOnProfileId:
          type: string
        createdDate:
          type: string
          format: date-time
        lastModifiedDate:
          type: string
          format: date-time
    InvestmentProfileCurrent:
      type: object
      properties:
        profileId:
          type: string
        clientId:
          type: string
        status:
          type: string
          enum: [current]
        investmentObjective:
          type: string
        riskTolerance:
          type: string
        timeHorizon:
          type: integer
        assetAllocation:
          type: object
        publishedDate:
          type: string
          format: date-time
        publishedBy:
          type: string
    InvestmentProfileArchived:
      type: object
      properties:
        profileId:
          type: string
        clientId:
          type: string
        status:
          type: string
          enum: [archived]
        investmentObjective:
          type: string
        riskTolerance:
          type: string
        assetAllocation:
          type: object
        archivedDate:
          type: string
          format: date-time
        archiveRetentionExpiry:
          type: string
          format: date-time
    ArchivedProfilesList:
      type: object
      properties:
        archivedProfiles:
          type: array
          items:
            $ref: '#/components/schemas/InvestmentProfileArchived'
        pageInfo:
          type: object
          properties:
            skip:
              type: integer
            take:
              type: integer
            total:
              type: integer
    OperationResult:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        profileId:
          type: string
        status:
          type: string
    OperationResultWithFields:
      allOf:
        - $ref: '#/components/schemas/OperationResult'
        - type: object
          properties:
            updatedFields:
              type: array
              items:
                type: string
    PublishResult:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        profileId:
          type: string
        status:
          type: string
        publishedDate:
          type: string
          format: date-time
    InvestmentProfileDraftUpdate:
      type: object
      properties:
        investmentObjective:
          type: string
        riskTolerance:
          type: string
        timeHorizon:
          type: integer
        annualIncome:
          type: number
        netWorth:
          type: number
        investmentExperience:
          type: string
        investmentAmount:
          type: number
        assetAllocation:
          type: object
        specialConsiderations:
          type: string

    # --- AUTH SCHEMAS ---
    SignUpRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
          description: Optional phone number in E.164 format (e.g. +12025551234)
        userType:
          type: string
          enum: [client, advisor, associate]
          description: Optional - defaults to client
        smsOptIn:
          type: boolean
          default: false
          description: User consent for SMS MFA and notifications
    SignUpResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        userId:
          type: string
        requiresEmailVerification:
          type: boolean
    LoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
    LoginResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        sessionId:
          type: string
        userId:
          type: string
        email:
          type: string
        requiresMfa:
          type: boolean
    SendMfaRequest:
      type: object
      properties:
        userId:
          type: string
        sessionId:
          type: string
        via:
          type: string
          enum: [sms, email]
    SendMfaResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        verificationSid:
          type: string
        sentVia:
          type: string
        maskedDestination:
          type: string
    VerifyMfaRequest:
      type: object
      properties:
        userId:
          type: string
        sessionId:
          type: string
        mfaCode:
          type: string
        via:
          type: string
          enum: [sms, email]
    VerifyMfaResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        accessToken:
          type: string
        refreshToken:
          type: string
        tokenType:
          type: string
        expiresIn:
          type: integer
        mfaMethod:
          type: string
        user:
          type: object
    VerifyEmailRequest:
      type: object
      properties:
        userId:
          type: string
        token:
          type: string
    VerifyEmailResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        userId:
          type: string
    ForgotPasswordRequest:
      type: object
      properties:
        email:
          type: string
    ResetPasswordRequest:
      type: object
      properties:
        token:
          type: string
        newPassword:
          type: string
    # --- USER PROFILE SCHEMAS ---
    UserProfile:
      type: object
      properties:
        userId:
          type: string
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
        dateOfBirth:
          type: string
          format: date-time
        governmentId:
          type: string
          description: SSN or equivalent
        authProvider:
          type: string
          example: email
        role:
          type: string
          enum: [client, advisor, associate, supervisor]
        smsOptIn:
          type: boolean
        isEnabled:
          type: boolean
        emailVerified:
          type: boolean
        signupDate:
          type: string
          format: date-time
        crdNumber:
          type: string
          description: FINRA CRD number. Only present on profiles with role advisor or supervisor.
          example: '1234567'
        assignedAdvisor:
          $ref: '#/components/schemas/AssignedAdvisorInfo'
        address:
          $ref: '#/components/schemas/UserAddress'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    AssignedAdvisorInfo:
      type: object
      description: Resolved advisor details returned on a user profile response.
      properties:
        advisorId:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        crdNumber:
          type: string
          description: FINRA CRD number of the assigned advisor.
          example: '1234567'
    UserAddress:
      type: object
      description: Mailing or residential address.
      properties:
        street:
          type: string
          example: 123 Main St
        street2:
          type: string
          description: Apartment, suite, unit, floor, etc.
          example: Apt 4B
        city:
          type: string
          example: Springfield
        state:
          type: string
          example: IL
        postalCode:
          type: string
          example: '62701'
        country:
          type: string
          example: US
    UpdateUserProfileRequest:
      type: object
      description: |
        All fields are optional — only supplied fields are applied.
        Field availability depends on the caller's role:
          client/advisor/associate : firstName, lastName, dateOfBirth, phone, governmentId, smsOptIn
          advisor/associate        : above + isEnabled
          supervisor               : above + role
      properties:
        firstName:
          type: string
        lastName:
          type: string
        dateOfBirth:
          type: string
          format: date-time
        phone:
          type: string
          description: Phone number in E.164 format (e.g. +12025551234)
        governmentId:
          type: string
        smsOptIn:
          type: boolean
          description: User consent for SMS MFA and notifications
        crdNumber:
          type: string
          description: |
            FINRA CRD number (4–7 digits). Only applicable to profiles with role advisor or supervisor.
            Settable by the profile owner (if advisor/supervisor) or a supervisor.
          example: '1234567'
        assignedAdvisorId:
          type: string
          description: Supervisor only. ID of the advisor or supervisor to assign to this user.
        address:
          $ref: '#/components/schemas/UserAddress'
          description: Mailing or residential address
        isEnabled:
          type: boolean
          description: Advisor, associate, or supervisor only
        role:
          type: string
          enum: [client, advisor, associate, supervisor]
          description: Supervisor only
    UpdateUserProfileResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        updatedFields:
          type: array
          items:
            type: string
    # --- AUDIT LOG SCHEMAS ---
    AuditLogFieldChange:
      type: object
      description: Before and after values for a single changed field.
      properties:
        before:
          description: Value before the change. Null if field was previously unset. Redacted for sensitive fields (e.g. governmentId).
        after:
          description: Value after the change. Redacted for sensitive fields (e.g. governmentId).
    AuditLogDetails:
      type: object
      description: >
        Flexible details payload keyed by event type.
        For profile_updated events, contains a "changes" map where each key is a field name
        and each value is an AuditLogFieldChange.
      additionalProperties: true
      example:
        changes:
          firstName:
            before: John
            after: Jonathan
          phone:
            before: "+12025550001"
            after: "+12025550002"
          governmentId:
            before: "***REDACTED***"
            after: "***REDACTED***"
    # --- INVESTMENT PROFILE QUESTIONS SCHEMAS ---
    QuestionCondition:
      type: object
      description: |
        Defines when a follow-up question group should be shown based on the parent question's answer.
        Uses a uniform { operator, value } shape — every operator always has a value field.
        Supported operators: eq, neq, contains, gt, lt, gte, lte
      required:
        - operator
        - value
      properties:
        operator:
          type: string
          enum: [eq, neq, contains, gt, lt, gte, lte]
          description: |
            eq       — answer equals value (case-insensitive). Use with booleans: value "true" or "false".
            neq      — answer does not equal value.
            contains — answer string contains value (case-insensitive). Use with multipleChoice answers.
            gt/lt/gte/lte — numeric comparisons.
        value:
          type: string
          description: The comparison value as a string (e.g. "true", "pay", "50000").
    FollowUpQuestionGroup:
      type: object
      description: A group of follow-up questions shown when the parent question's answer satisfies the condition.
      properties:
        condition:
          $ref: '#/components/schemas/QuestionCondition'
        questions:
          type: array
          items:
            $ref: '#/components/schemas/InvestmentProfileQuestion'
    InvestmentProfileQuestion:
      type: object
      description: A single question in an investment profile question set.
      properties:
        id:
          type: string
          description: Stable snake_case identifier (e.g. date_of_birth). Used to map client answers back to questions.
        title:
          type: string
          description: Short display label.
        content:
          type: string
          description: Full question text shown to the client.
        type:
          type: string
          enum: [boolean, multipleChoice, freeform, date, integer, decimal]
          description: |
            boolean       — True/false. Answer submitted as string "true" or "false".
            multipleChoice — Client picks one value from choices array.
            freeform      — Open text. May allow multiple responses.
            date          — ISO 8601 date string.
            integer       — Whole number.
            decimal       — Decimal/currency number.
        isRequired:
          type: boolean
        displayOrder:
          type: integer
          description: Sort order within its parent question list.
        choices:
          type: array
          items:
            type: string
          nullable: true
          description: Valid choices for multipleChoice questions. Null for all other types.
        allowsMultipleResponses:
          type: boolean
          default: false
          description: If true, the client can submit more than one answer (e.g. listing multiple retirement accounts).
        followUpQuestions:
          type: array
          items:
            $ref: '#/components/schemas/FollowUpQuestionGroup'
          description: Conditional groups of questions shown based on this question's answer.
        minValue:
          type: number
          nullable: true
          description: Minimum value for integer or decimal questions.
        maxValue:
          type: number
          nullable: true
          description: Maximum value for integer or decimal questions.
        helpText:
          type: string
          nullable: true
          description: Optional hint text shown below the question.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    InvestmentProfileQuestionsDocument:
      type: object
      description: |
        A versioned set of investment profile questions.
        Status lifecycle: draft → current → archived.
        Only one current and one draft can exist per named set at a time.
        Auto-seeded from defaults when no current set exists for a given name.
      properties:
        id:
          type: string
          description: GUID question-set ID.
        name:
          type: string
          description: |
            Question set name. Used to support different sets for different client types.
            Valid values: basic-individual-investment-profile
          example: basic-individual-investment-profile
        status:
          type: string
          enum: [current, draft, archived]
        description:
          type: string
        questions:
          type: array
          items:
            $ref: '#/components/schemas/InvestmentProfileQuestion'
        createdDate:
          type: string
          format: date-time
        createdBy:
          type: string
          description: Supervisor userId, or "system" for auto-seeded sets.
        lastModifiedDate:
          type: string
          format: date-time
        lastModifiedBy:
          type: string
        publishedDate:
          type: string
          format: date-time
          nullable: true
        publishedBy:
          type: string
          nullable: true
        archivedDate:
          type: string
          format: date-time
          nullable: true
        archiveRetentionExpiry:
          type: string
          format: date-time
          nullable: true
          description: 5-year retention window, same as investment profiles.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    UpdateInvestmentProfileQuestionsRequest:
      type: object
      description: Replaces the questions array on the draft question set.
      properties:
        description:
          type: string
        questions:
          type: array
          items:
            $ref: '#/components/schemas/InvestmentProfileQuestion'
    PublishQuestionsResult:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        questionsSetId:
          type: string
        status:
          type: string
          enum: [current]
        publishedDate:
          type: string
          format: date-time
    ArchivedQuestionSetsList:
      type: object
      properties:
        archivedSets:
          type: array
          items:
            $ref: '#/components/schemas/InvestmentProfileQuestionsDocument'
        pageInfo:
          type: object
          properties:
            skip:
              type: integer
            take:
              type: integer
            total:
              type: integer
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
    AuditLogEntry:
      type: object
      properties:
        id:
          type: string
          description: MongoDB ObjectId
        eventType:
          type: string
          description: >
            Type of event. Known values:
            user_signup_completed, email_verified, login, logout,
            profile_updated, profile_viewed,
            access_granted, access_revoked,
            investment_profile_questions_viewed,
            investment_profile_questions_draft_viewed,
            investment_profile_questions_archived_viewed,
            investment_profile_questions_archived_listed,
            investment_profile_questions_draft_started,
            investment_profile_questions_draft_updated,
            investment_profile_questions_published,
            investment_profile_questions_draft_deleted,
            token_refreshed
          example: profile_updated
        userId:
          type: string
          description: ID of the user who performed the action
        targetUserId:
          type: string
          description: ID of the user affected by the action (may be null for self-actions)
        action:
          type: string
          description: Human-readable description of the action
          example: "User updated own profile"
        details:
          $ref: '#/components/schemas/AuditLogDetails'
        ipAddress:
          type: string
        userAgent:
          type: string
        statusCode:
          type: integer
          description: HTTP response status code at time of event
        errorMessage:
          type: string
          description: Error message if the action failed (null on success)
        timestamp:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
